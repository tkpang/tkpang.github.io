---
layout: page
title: "世界历史时间线"
description: "5000年文明史交互式时空图"
header-img: "img/post-bg-home.jpg"
---

<!-- 引入样式 -->
<link rel="stylesheet" href="{{ site.baseurl }}/css/history-timeline.css">

<div class="timeline-container">
        <!-- 控制面板 -->
        <div class="timeline-controls">
            <div class="control-group">
                <label>时间范围：</label>
                <select id="timeRange">
                    <option value="all">全部历史 (5000年)</option>
                    <option value="ancient">古代 (公元前3000-公元500)</option>
                    <option value="medieval">中世纪 (500-1500)</option>
                    <option value="modern">近现代 (1500-2000)</option>
                </select>
            </div>
            <div class="control-group">
                <label>显示地区：</label>
                <select id="regionFilter">
                    <option value="all">全部地区</option>
                    <option value="asia">亚洲</option>
                    <option value="europe">欧洲</option>
                    <option value="africa">非洲</option>
                    <option value="americas">美洲</option>
                </select>
            </div>
            <div class="control-group">
                <button id="resetZoom" class="btn-control">重置视图</button>
            </div>
        </div>

        <!-- 时间线画布 -->
        <div class="timeline-canvas-wrapper">
            <canvas id="timelineCanvas"></canvas>
        </div>

        <!-- 详情面板 -->
        <div id="detailPanel" class="detail-panel hidden">
            <div class="detail-header">
                <h3 id="detailTitle"></h3>
                <button id="closeDetail" class="btn-close">×</button>
            </div>
            <div class="detail-content">
                <div class="detail-info">
                    <div class="info-row">
                        <span class="info-label">时期：</span>
                        <span id="detailPeriod"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">地区：</span>
                        <span id="detailRegion"></span>
                    </div>
                </div>
                <div class="detail-description">
                    <h4>简介</h4>
                    <p id="detailDescription"></p>
                </div>
                <div class="detail-highlights">
                    <h4>重大事件</h4>
                    <ul id="detailEvents"></ul>
                </div>
            </div>
        </div>

        <!-- 图例 -->
        <div class="timeline-legend">
            <h4>地区图例</h4>
            <div class="legend-items">
                <div class="legend-item">
                    <span class="legend-color" style="background: #e74c3c;"></span>
                    <span>东亚</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #3498db;"></span>
                    <span>南亚</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #2ecc71;"></span>
                    <span>西亚</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #f39c12;"></span>
                    <span>欧洲</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #9b59b6;"></span>
                    <span>非洲</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #1abc9c;"></span>
                    <span>美洲</span>
                </div>
            </div>
        </div>

        <!-- 使用说明 -->
        <div class="timeline-help">
            <p><strong>使用说明：</strong></p>
            <ul>
                <li>点击色块查看该文明时期的详细信息</li>
                <li>使用鼠标滚轮可以缩放时间线</li>
                <li>拖动画布可以移动视图</li>
                <li>使用上方的筛选器可以过滤显示内容</li>
            </ul>
        </div>
    </div>

<!-- 引入JavaScript -->
<script src="{{ site.baseurl }}/js/history-data.js"></script>
<script src="{{ site.baseurl }}/js/history-timeline.js"></script>
